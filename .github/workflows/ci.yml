name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api-spec-sync:
    name: OpenAPI spec is in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Uses the version declared in the root package.json's
      # packageManager field (pnpm@9.15.0). Avoids corepack
      # mismatch if that field drifts from a hardcoded version here.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (required before typecheck in any downstream job)
        run: pnpm db:generate

      - name: Sync OpenAPI spec and generated types
        run: pnpm api:sync

      - name: Fail if spec or generated types drifted
        run: |
          if ! git diff --exit-code packages/api-client/openapi.json packages/api-client/src/generated/; then
            echo ""
            echo "::error::OpenAPI spec or generated types are out of sync."
            echo "::error::Run 'pnpm api:sync' locally and commit the result."
            exit 1
          fi

  typecheck:
    name: Typecheck all packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm api:sync # ensure generated types exist before typecheck
      - run: pnpm typecheck

  test:
    name: Unit and integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm db:generate
      - run: pnpm api:sync

      # Fast feedback: unit tests first, fail before spinning up DB.
      - name: Run unit tests
        run: pnpm test:unit

      # DB integration tests run against a fresh local Supabase instance
      # spun up just for this job. Schema applied via prisma db push so
      # no migration artifacts leak into the run.
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local
        run: supabase start

      - name: Apply Prisma schema to local DB
        run: pnpm db:push
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

      - name: Run integration tests
        run: pnpm test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

      # Mandatory cleanup even on test failure — leaves no hanging
      # containers around between job runs.
      - name: Stop Supabase local
        if: always()
        run: supabase stop
