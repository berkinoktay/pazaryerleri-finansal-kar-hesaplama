name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel a superseded run on the same ref. PR pushes supersede the prior
# in-flight run (saves limited private-repo Actions minutes); main-branch runs
# are never cancelled so every merge gets a complete, recorded run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Detects whether the PR/push touches any non-docs files. The `test` and
  # `build` jobs gate on this so that docs-only changes skip the slow Supabase
  # spin-up / build entirely. typecheck, lint, and api-spec-sync stay
  # unconditional — they're fast and useful even on docs PRs.
  changes:
    name: Detect non-docs changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # dorny/paths-filter calls the GitHub PR-files API to compute the diff.
    # The default GITHUB_TOKEN permissions don't include `pull-requests: read`
    # in repos where the org has tightened defaults — grant it explicitly.
    permissions:
      pull-requests: read
      contents: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!.github/**/*.md'

  api-spec-sync:
    name: OpenAPI spec is in sync
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      # Composite runs api:sync; the step below fails if the committed spec
      # or generated types drifted from what api:sync produces.
      - uses: ./.github/actions/setup
      - name: Fail if spec or generated types drifted
        run: |
          if ! git diff --exit-code packages/api-client/openapi.json packages/api-client/src/generated/; then
            echo ""
            echo "::error::OpenAPI spec or generated types are out of sync."
            echo "::error::Run 'pnpm api:sync' locally and commit the result."
            exit 1
          fi

  typecheck:
    name: Typecheck all packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm typecheck

  lint:
    name: Lint all packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      # Filter forces every workspace package into scope. Without it,
      # turbo's affected-detection might skip packages it considers unchanged.
      - run: pnpm turbo run lint --filter='@pazarsync/*'
      - name: Format check
        run: pnpm format:check

  build:
    name: Build all apps
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build
        run: pnpm build
        env:
          # next build inlines NEXT_PUBLIC_* at build time; these placeholders
          # satisfy boot/validation. No real secrets — CI never reaches Supabase.
          NEXT_PUBLIC_SUPABASE_URL: https://ci.pazarsync.test
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
          NEXT_PUBLIC_API_URL: https://ci.pazarsync.test
          NEXT_PUBLIC_ALLOW_SANDBOX_CONNECTIONS: 'true'

  pr-title:
    name: PR title is conventional
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      # Squash-merge uses the PR title as the main commit message; commitlint
      # only checks local commit messages, not the PR title. This closes the gap.
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # gitleaks scans full commit history
      # Native GitHub secret scanning needs Advanced Security (paid on private
      # repos), so this OSS action fills the gap. Blocking: the #214 first pass
      # was clean, so it was flipped from non-blocking to blocking in #216.
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'false'

  deps-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      # pnpm audit needs only the lockfile, so we skip the full install/codegen
      # of the composite. Blocking: the #214 first pass was clean (flipped in #216).
      - name: Audit (high and critical)
        run: pnpm audit --audit-level=high

  test:
    name: Unit and integration tests
    needs: changes
    # Skipped jobs report as "Skipped" (counts as success for branch
    # protection), unlike workflow-level paths-ignore which leaves
    # required checks pending forever.
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      # Fast feedback: unit tests first, fail before spinning up DB.
      - name: Run unit tests
        run: pnpm test:unit

      # Component tests (happy-dom, DB-free) — run before the Supabase spin-up
      # so a broken component fails fast without paying the DB cost. These live
      # in apps/web/tests/component and previously ran in NO CI job.
      - name: Run component tests
        run: pnpm test:component

      # DB integration tests run against a fresh local Supabase instance
      # spun up just for this job. Schema applied via prisma db push so
      # no migration artifacts leak into the run.
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start Supabase local
        run: supabase start

      # Pull Supabase's local keys into $GITHUB_ENV so subsequent steps
      # (db:push, integration tests) inherit them. Values are generated
      # by `supabase start` and are not production secrets; tying them to
      # the live instance protects against CLI-version drift in future.
      - name: Export Supabase env to GITHUB_ENV
        run: |
          while IFS='=' read -r key value; do
            [ -z "$key" ] && continue
            clean="${value%\"}"
            clean="${clean#\"}"
            case "$key" in
              API_URL) echo "SUPABASE_URL=$clean" >> "$GITHUB_ENV" ;;
              SECRET_KEY) echo "SUPABASE_SECRET_KEY=$clean" >> "$GITHUB_ENV" ;;
              PUBLISHABLE_KEY) echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$clean" >> "$GITHUB_ENV" ;;
            esac
          done < <(supabase status -o env)

      - name: Apply Prisma schema to local DB
        run: pnpm db:push
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

      # `--concurrency=1` is load-bearing: every package's integration
      # tests share the same local Supabase DB and call `truncateAll()`
      # in `beforeEach`. With turbo's default parallelism (numCpus),
      # multiple packages' suites race on the shared DB and intermittently
      # fail with P2003 ForeignKeyConstraintViolation when one suite's
      # `truncateAll` wipes another suite's setup mid-test. Serializing
      # across packages keeps each suite's transactional isolation
      # intact. Local devs typically run a single package's tests at a
      # time so the package.json alias stays parallel-friendly; we only
      # serialize in CI where every package runs together.
      - name: Run integration tests
        run: pnpm turbo run test:integration --concurrency=1
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          # NODE_ENV is validated at boot by apps/api/src/lib/env.ts —
          # 'test' is the recognised mode for CI runs (alongside
          # production, staging, development). Production must set this
          # explicitly so the OpenAPI docs gate stays closed.
          # SUPABASE_URL, SUPABASE_SECRET_KEY, NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
          # are populated by the "Export Supabase env" step above. The new auth
          # middleware calls `supabase.auth.getUser(token)` via the secret
          # client; the test helper `createAuthenticatedTestUser` signs in via
          # the publishable client. Both need live Supabase local creds.
          # Trendyol URLs are placeholders — integration tests mock fetch at
          # the network layer. CI never touches the real Trendyol endpoints.
          TRENDYOL_PROD_BASE_URL: https://apigw.trendyol.com
          TRENDYOL_SANDBOX_BASE_URL: https://stageapigw.trendyol.com
          TRENDYOL_INTEGRATOR_UA_SUFFIX: SelfIntegration
          # PR-A sync-worker defaults — prod forward-only (0) + 8h cron safety net.
          # Tests override per-case via process.env; these document the prod baseline.
          SYNC_HISTORICAL_BACKFILL_DAYS: 0
          SYNC_SAFETY_NET_HOURS: 8
          # PR-C2 webhook callback URL builder — integration tests mock fetch,
          # so the value never reaches Trendyol. Production sets the real HTTPS
          # tunnel/host. Empty would fail validateRequiredEnv at boot.
          PUBLIC_API_BASE_URL: https://ci.pazarsync.test
          ALLOW_SANDBOX_CONNECTIONS: 'true'
          NEXT_PUBLIC_ALLOW_SANDBOX_CONNECTIONS: 'true'
          # Fake 32-byte hex for tests — store-create calls encryptCredentials
          # which demands a valid key. Per SECURITY.md §7, ephemeral test-only
          # secrets inline in workflow files are fine; this value cannot unlock
          # anything outside of the CI job's own DB.
          ENCRYPTION_KEY: deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef

      # Mandatory cleanup even on test failure — leaves no hanging
      # containers around between job runs.
      - name: Stop Supabase local
        if: always()
        run: supabase stop

  # Single aggregate status. A future GitHub Pro upgrade can mark just this as
  # the required check. skipped jobs (build/test on docs-only PRs, pr-title on
  # push) count as success; only real failures/cancellations fail the gate.
  ci-success:
    name: CI success
    if: always()
    needs: [api-spec-sync, typecheck, lint, build, pr-title, secret-scan, deps-audit, test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: echo "One or more required jobs failed or were cancelled" && exit 1
