name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel a superseded run on the same ref. PR pushes supersede the prior
# in-flight run (saves limited private-repo Actions minutes); main-branch runs
# are never cancelled so every merge gets a complete, recorded run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Detects whether the PR/push touches any non-docs files. The `test` and
  # `build` jobs gate on this so that docs-only changes skip the slow Supabase
  # spin-up / build entirely. typecheck, lint, and api-spec-sync stay
  # unconditional — they're fast and useful even on docs PRs.
  changes:
    name: Detect non-docs changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # dorny/paths-filter calls the GitHub PR-files API to compute the diff.
    # The default GITHUB_TOKEN permissions don't include `pull-requests: read`
    # in repos where the org has tightened defaults — grant it explicitly.
    permissions:
      pull-requests: read
      contents: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!.github/**/*.md'

  api-spec-sync:
    name: OpenAPI spec is in sync
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      # Composite runs api:sync; the step below fails if the committed OpenAPI
      # spec drifted from what api:sync produces. The generated types under
      # src/generated/ are gitignored, so `git diff` can never see them — they
      # are regenerated fresh here, and a drift in them surfaces as a downstream
      # typecheck/build failure, not as a diff. So we only gate on openapi.json.
      - uses: ./.github/actions/setup
      - name: Fail if the OpenAPI spec drifted
        run: |
          if ! git diff --exit-code packages/api-client/openapi.json; then
            echo ""
            echo "::error::OpenAPI spec is out of sync."
            echo "::error::Run 'pnpm api:sync' locally and commit the result."
            exit 1
          fi

  typecheck:
    name: Typecheck all packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          turbo-cache: 'true'
      - run: pnpm typecheck

  lint:
    name: Lint all packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          turbo-cache: 'true'
      # Every workspace declares a `lint` script (enforced by `pnpm audit:lint`),
      # so this genuinely lints all packages — including the profit engine, crypto,
      # and marketplace adapters. The filter pulls every workspace into scope
      # regardless of turbo's affected-detection.
      - run: pnpm turbo run lint --filter='@pazarsync/*'
      - name: Format check
        run: pnpm format:check

  build:
    name: Build all apps
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          turbo-cache: 'true'
      - name: Build
        run: pnpm build
        env:
          # next build inlines NEXT_PUBLIC_* at build time; these placeholders
          # satisfy boot/validation. No real secrets — CI never reaches Supabase.
          NEXT_PUBLIC_SUPABASE_URL: https://ci.pazarsync.test
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
          NEXT_PUBLIC_API_URL: https://ci.pazarsync.test
          NEXT_PUBLIC_ALLOW_SANDBOX_CONNECTIONS: 'true'

  pr-title:
    name: PR title is conventional
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      # Squash-merge uses the PR title as the main commit message; commitlint
      # only checks local commit messages, not the PR title. This closes the gap.
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # gitleaks-action calls the PR-commits API. The default GITHUB_TOKEN here
    # only carries contents/metadata/packages read, so grant pull-requests:read
    # explicitly (without it the action 403s with "Resource not accessible by
    # integration") — same reason the `changes` job sets it.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # gitleaks scans full commit history
      # Native GitHub secret scanning needs Advanced Security (paid on private
      # repos), so this OSS action fills the gap. gitleaks-action REQUIRES
      # GITHUB_TOKEN to scan PR commits — without it the step errors (which the
      # earlier continue-on-error masked as a false "pass"). Blocking as of #216.
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'false'

  deps-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # pnpm audit needs only the lockfile, so we skip the full install/codegen
      # of the composite — and setup-node's `cache: pnpm` with it. With no install
      # there is no pnpm store to cache, so the post-run cache save fails with a
      # "path does not exist" error and fails the whole job whenever a lockfile
      # change misses the restore cache (e.g. any PR that touches dependencies).
      # --prod scopes the blocking gate to PRODUCTION deps; dev-tool transitive
      # advisories (e.g. commitlint→ajv→fast-uri) are left to Dependabot's weekly
      # PRs instead of blocking every build. Blocking as of #216.
      # 2026-07-15: npm fully retired the legacy audit endpoints — both
      # /-/npm/v1/security/audits and /quick now answer 410 "endpoint is being
      # retired" (scheduled brownout ended July 15). pnpm 10.x still queries
      # them, so `pnpm audit` dies with ERR_PNPM_AUDIT_BAD_RESPONSE on every
      # run; pnpm 11+ switched to the bulk advisory endpoint (pnpm/pnpm#11265).
      # Until the pnpm 11 migration lands as its own PR, tolerate EXACTLY that
      # infrastructure failure. A real vulnerability finding still exits 1 and
      # fails the job — this does not soften the audit gate itself.
      - name: Audit (high and critical, production deps)
        run: |
          set +e
          output=$(pnpm audit --prod --audit-level=high 2>&1)
          status=$?
          set -e
          printf '%s\n' "$output"
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if printf '%s' "$output" | grep -q 'ERR_PNPM_AUDIT_BAD_RESPONSE'; then
            echo "::warning::pnpm audit skipped: npm retired the legacy audit endpoints (pnpm/pnpm#11265). Re-enable by migrating to pnpm 11 (own PR)."
            exit 0
          fi
          exit "$status"

  unit-tests:
    name: Unit and component tests
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          turbo-cache: 'true'
      # DB-free suites split out of the integration job (#401): they give first
      # signal in ~6 minutes and run in parallel with the Supabase-backed job
      # instead of serially in front of it.
      - name: Run unit tests
        run: pnpm test:unit
      - name: Run component tests
        run: pnpm test:component

  test:
    name: Integration tests
    needs: changes
    # Skipped jobs report as "Skipped" (counts as success for branch
    # protection), unlike workflow-level paths-ignore which leaves
    # required checks pending forever.
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    # Only the integration suite runs here now (unit/component moved to the
    # unit-tests job); on a cold cache Supabase spin-up + db:push + the suite
    # land around ~18-20m, so 30m keeps headroom without the old 40m slack.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      # No turbo cache here — deliberately; see the setup action's turbo-cache
      # input docs (integration hash can't see supabase/sql or config.toml).
      - uses: ./.github/actions/setup

      # DB integration tests run against a fresh local Supabase instance
      # spun up just for this job. Schema applied via prisma db push so
      # no migration artifacts leak into the run.
      #
      # PINNED (issue #305): `version: latest` pulled v2.106.0 the hour it
      # shipped (2026-06-11) and broke CI two independent ways — the new
      # image drops the default public-schema grants the RLS suite sat on
      # (now also mitigated by the explicit grant baseline in
      # rls-policies.sql), and `supabase start` itself dies on the
      # edge_runtime health check (Error status 502). A day-zero CLI in CI
      # is a gamble; pin to the last known-good stable and bump
      # deliberately — re-evaluate on the next stable release.
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.105.0

      - name: Start Supabase local
        run: supabase start

      # Pull Supabase's local keys into $GITHUB_ENV so subsequent steps
      # (db:push, integration tests) inherit them. Values are generated
      # by `supabase start` and are not production secrets; tying them to
      # the live instance protects against CLI-version drift in future.
      - name: Export Supabase env to GITHUB_ENV
        run: |
          while IFS='=' read -r key value; do
            [ -z "$key" ] && continue
            clean="${value%\"}"
            clean="${clean#\"}"
            case "$key" in
              API_URL) echo "SUPABASE_URL=$clean" >> "$GITHUB_ENV" ;;
              SECRET_KEY) echo "SUPABASE_SECRET_KEY=$clean" >> "$GITHUB_ENV" ;;
              PUBLISHABLE_KEY) echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$clean" >> "$GITHUB_ENV" ;;
            esac
          done < <(supabase status -o env)

      - name: Apply Prisma schema to local DB
        run: pnpm db:push
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

      # `--concurrency=1` is load-bearing: every package's integration
      # tests share the same local Supabase DB and call `truncateAll()`
      # in `beforeEach`. With turbo's default parallelism (numCpus),
      # multiple packages' suites race on the shared DB and intermittently
      # fail with P2003 ForeignKeyConstraintViolation when one suite's
      # `truncateAll` wipes another suite's setup mid-test. Serializing
      # across packages keeps each suite's transactional isolation
      # intact. Local devs typically run a single package's tests at a
      # time so the package.json alias stays parallel-friendly; we only
      # serialize in CI where every package runs together.
      - name: Run integration tests
        run: |
          pnpm turbo run test:integration --concurrency=1
          # The RLS suite is excluded from the main integration config (it drives
          # PostgREST/GoTrue, which only serve the "postgres" DB) and runs via its
          # own config here. It shares this env block; in CI DATABASE_URL already
          # IS the disposable per-job postgres DB, so no separate DB is needed.
          pnpm --filter @pazarsync/api test:integration:rls
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          # Isolated test DB. In CI there is no second DB to provision — the
          # per-job Supabase instance is already disposable — so this points at
          # the SAME postgres DB the schema was pushed to. One code path: the
          # vitest remap sets DATABASE_URL := TEST_DATABASE_URL (a no-op here).
          TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          # NODE_ENV is validated at boot by apps/api/src/lib/env.ts —
          # 'test' is the recognised mode for CI runs (alongside
          # production, staging, development). Production must set this
          # explicitly so the OpenAPI docs gate stays closed.
          # SUPABASE_URL, SUPABASE_SECRET_KEY, NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
          # are populated by the "Export Supabase env" step above. The new auth
          # middleware calls `supabase.auth.getUser(token)` via the secret
          # client; the test helper `createAuthenticatedTestUser` signs in via
          # the publishable client. Both need live Supabase local creds.
          # Trendyol URLs are placeholders — integration tests mock fetch at
          # the network layer. CI never touches the real Trendyol endpoints.
          TRENDYOL_PROD_BASE_URL: https://apigw.trendyol.com
          TRENDYOL_SANDBOX_BASE_URL: https://stageapigw.trendyol.com
          TRENDYOL_INTEGRATOR_UA_SUFFIX: SelfIntegration
          # PR-A sync-worker defaults — prod forward-only (0) + 8h cron safety net.
          # Tests override per-case via process.env; these document the prod baseline.
          # ALLOW_HISTORICAL_BACKFILL stays 'false': backfill is 0 here so the opt-in
          # is inert, and this documents the fail-closed prod default (env.test.ts
          # sets its own values per case).
          SYNC_HISTORICAL_BACKFILL_DAYS: 0
          ALLOW_HISTORICAL_BACKFILL: 'false'
          SYNC_SAFETY_NET_HOURS: 8
          # In-process worker-pool size (default 4). Documents the prod default;
          # the integration suite does not drive the poll loop.
          SYNC_WORKER_CONCURRENCY: 4
          # Webhook-events retention cleanup baseline (default 90). Tests override
          # per-case via process.env; this documents the prod default.
          WEBHOOK_EVENT_RETENTION_DAYS: 90
          # Webhook ingest emergency escape hatch (Paket D §D6; cutover #460).
          # Default off = deferred intake (the sync-worker consumer processes the
          # queue); the inline-mode tests stub 'true' per-case/per-file.
          WEBHOOK_INTAKE_INLINE: 'false'
          # PR-C2 webhook callback URL builder — integration tests mock fetch,
          # so the value never reaches Trendyol. Production sets the real HTTPS
          # tunnel/host. Empty would fail validateRequiredEnv at boot.
          PUBLIC_API_BASE_URL: https://ci.pazarsync.test
          ALLOW_SANDBOX_CONNECTIONS: 'true'
          NEXT_PUBLIC_ALLOW_SANDBOX_CONNECTIONS: 'true'
          # Fake 32-byte hex for tests — store-create calls encryptCredentials
          # which demands a valid key. Per SECURITY.md §7, ephemeral test-only
          # secrets inline in workflow files are fine; this value cannot unlock
          # anything outside of the CI job's own DB.
          ENCRYPTION_KEY: deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef

      # Mandatory cleanup even on test failure — leaves no hanging
      # containers around between job runs.
      - name: Stop Supabase local
        if: always()
        run: supabase stop

  actionlint:
    name: Workflow lint (actionlint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      # We edit ci.yml often now (job split, turbo cache, timeouts) and the only
      # guard was a YAML parse. actionlint catches Actions-specific breakage:
      # bad ${{ }} expressions, dangling needs/job refs, shellcheck on run:
      # blocks, invalid permissions/runners. Version pinned like every other
      # third-party tool in this workflow; bump deliberately.
      - name: Run actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.12
          ./actionlint -color

  edge-functions:
    name: Edge Functions (Deno)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # Supabase Edge Functions are Deno, deliberately outside the pnpm/turbo
      # workspace (they cannot import @pazarsync/* — see supabase/functions/README.md),
      # so nothing else in CI type-checks them. Each function carries its own
      # deno.json import map, so we check per-directory rather than with one
      # repo-wide glob (which would not resolve the per-function bare specifiers).
      - name: Type-check Edge Functions
        working-directory: supabase/functions
        run: |
          shopt -s nullglob
          status=0
          for dir in */; do
            [ -f "${dir}deno.json" ] || continue
            echo "::group::deno check ${dir}"
            # Quote the glob so Deno expands it (works regardless of bash version
            # / globstar support); cd in so the per-function deno.json import map applies.
            ( cd "$dir" && deno check "./**/*.ts" ) || status=1
            echo "::endgroup::"
          done
          exit $status
      # Only fx-rates-sync has tests today (the TCMB parser feeds fx_rates, used
      # in money math). `deno test` on a dir with no test modules errors, so this
      # stays explicit rather than looping over every function.
      - name: Test Edge Functions (fx-rates-sync)
        working-directory: supabase/functions/fx-rates-sync
        run: deno test --allow-read

  # Single aggregate status. A future GitHub Pro upgrade can mark just this as
  # the required check. skipped jobs (build/test on docs-only PRs, pr-title on
  # push) count as success; only real failures/cancellations fail the gate.
  ci-success:
    name: CI success
    if: always()
    needs:
      [
        api-spec-sync,
        typecheck,
        lint,
        build,
        pr-title,
        secret-scan,
        deps-audit,
        unit-tests,
        test,
        actionlint,
        edge-functions,
      ]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: echo "One or more required jobs failed or were cancelled" && exit 1
