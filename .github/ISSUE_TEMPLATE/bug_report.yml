name: 🐛 Bug Report
description: Beklenmeyen davranış / hata bildir
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Özet
      description: Ne oluyor, kısaca?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Etkilenen alan
      options: [web, api, db, sync, ci, docs]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Tekrar adımları
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Beklenen davranış
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Gerçekleşen davranış
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Ortam / log / ekran görüntüsü (opsiyonel)
    validations:
      required: false
